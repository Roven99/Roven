<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROVEN | Official Bio</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            --gold-primary: #c3a343;
            --gold-secondary: #f1dca7;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #fff;
            --text-muted: rgba(255, 255, 255, 0.7);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            color: var(--text-main);
        }

        .main-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 50px 30px;
            border-radius: 35px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            animation: containerEntry 1s ease-out;
        }

        @keyframes containerEntry {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }
        .profile-wrapper::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 2px solid var(--gold-primary);
            box-shadow: 0 0 15px rgba(195, 163, 67, 0.5);
            animation: pulseGold 2s infinite;
        }
        @keyframes pulseGold {
            0% { box-shadow: 0 0 5px rgba(195, 163, 67, 0.4); }
            50% { box-shadow: 0 0 20px rgba(195, 163, 67, 0.7); }
            100% { box-shadow: 0 0 5px rgba(195, 163, 67, 0.4); }
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 4px solid #000;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--gold-secondary), var(--gold-primary), var(--gold-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .timer-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(195, 163, 67, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 35px;
            display: inline-block;
        }
        #timer {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.8rem;
            font-weight: bold;
            color: var(--gold-primary);
        }

        .instagram-btn {
            background: linear-gradient(45deg, var(--gold-primary), var(--gold-secondary));
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(195, 163, 67, 0.3);
            margin-bottom: 20px;
        }

        .music-control {
            font-size: 0.8rem;
            color: var(--gold-secondary);
            margin-top: 15px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body onclick="startExperience()">

    <div class="main-container">
        <div class="profile-wrapper">
            <img src="image.png" alt="Roven" class="profile-img">
        </div>
        
        <h1>ROVEN</h1>

        <div class="timer-box">
            <div id="timer">00:00:00</div>
        </div>
        
        <a href="https://www.instagram.com/o9nl_9/" target="_blank" class="instagram-btn">
            <span>Instagram: o9nl_9</span>
        </a>

        <div class="music-control" id="status">اضغط لتشغيل الموسيقى 🎵</div>
    </div>

    <audio id="kyomi" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        let startTime = Date.now();
        const timerElement = document.getElementById('timer');

        function updateTimer() {
            let now = Date.now();
            let diff = now - startTime;
            let h = Math.floor(diff / 3600000);
            let m = Math.floor((diff % 3600000) / 60000);
            let s = Math.floor((diff % 60000) / 1000);
            h = h < 10 ? '0' + h : h; m = m < 10 ? '0' + m : m; s = s < 10 ? '0' + s : s;
            timerElement.innerHTML = `${h}:${m}:${s}`;
        }
        setInterval(updateTimer, 1000);

        let audioStarted = false;
        const audio = document.getElementById('kyomi');
        const status = document.getElementById('status');

        function startExperience() {
            if (!audioStarted) {
                audio.play().then(() => {
                    audioStarted = true;
                    status.innerHTML = "Playing Local Music 🎶";
                }).catch(() => {
                    status.innerHTML = "Tap to enable music 🔇";
                });
            }
        }
    </script>
</body>
</html>
