<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roven | Bio</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            color: white;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 40px 20px;
            border-radius: 30px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #fff;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        h1 { font-size: 1.8rem; margin-bottom: 5px; letter-spacing: 1px; }
        p { opacity: 0.8; font-size: 0.9rem; margin-bottom: 25px; }

        #timer {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(to right, #fff, #8e9eab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
            display: block;
        }

        .music-status {
            font-size: 0.8rem;
            color: #00ffcc;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.7rem;
            opacity: 0.5;
        }
    </style>
</head>
<body onclick="handleInteraction()">

    <div class="container">
        <img src="image.png" alt="Roven" class="profile-img">
        
        <h1>ROVEN</h1>
        <p>Welcome to my space</p>

        <div id="timer">00:00:00</div>
        
        <div class="music-status" id="status">اضغط لتشغيل Kyomi 🎵</div>

        <div class="footer-text">Created by Roven99 • 2026</div>
    </div>

    <audio id="kyomi" loop>
        <source src="https://www.myinstants.com/media/sounds/kyomi-song.mp3" type="audio/mpeg">
    </audio>

    <script>
        // كود العداد التصاعدي
        let startTime = Date.now();
        const timerElement = document.getElementById('timer');

        function updateTimer() {
            let now = Date.now();
            let diff = now - startTime;

            let h = Math.floor(diff / 3600000);
            let m = Math.floor((diff % 3600000) / 60000);
            let s = Math.floor((diff % 60000) / 1000);

            h = h < 10 ? '0' + h : h;
            m = m < 10 ? '0' + m : m;
            s = s < 10 ? '0' + s : s;

            timerElement.innerHTML = `${h}:${m}:${s}`;
        }

        setInterval(updateTimer, 1000);

        // وظيفة تشغيل الموسيقى عند أول لمسة (لحل مشكلة الأيفون)
        let isPlaying = false;
        function handleInteraction() {
            const audio = document.getElementById('kyomi');
            const status = document.getElementById('status');
            
            if (!isPlaying) {
                audio.play().then(() => {
                    isPlaying = true;
                    status.innerHTML = "Playing: Kyomi Song 🎶";
                }).catch(error => {
                    console.log("تعذر التشغيل التلقائي:", error);
                });
            }
        }
    </script>
</body>
</html>
